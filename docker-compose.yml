# Local stack for development and integration tests.
# LocalStack (DynamoDB).
# Redis.
# the api container itself.
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - STORE=dynamodb
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE=url_shortener_links
      - REDIS_ADDR=redis:6379
      - CACHE_TTL=5m
      - BASE_URL=http://localhost:8080
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566" # single edge port for all AWS services
    environment:
      - SERVICES=dynamodb
      - DEBUG=0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4566/_localstack/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
