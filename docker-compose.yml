# Local stack for development and integration tests.
# LocalStack (DynamoDB)
# Redis
# SQS
# MySQL + worker
# the api container itself.
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - STORE=dynamodb
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE=url_shortener_links
      - REDIS_ADDR=redis:6379
      - CACHE_TTL=5m
      - BASE_URL=http://localhost:8080
      - EVENTS=sqs
      - SQS_QUEUE_NAME=url_shortener_clicks
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566" # single edge port for all AWS services
    environment:
      - SERVICES=dynamodb,sqs
      - DEBUG=0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4566/_localstack/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=urlshortener
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15

  worker:
    build: .
    entrypoint: ["/worker"]
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - SQS_QUEUE_NAME=url_shortener_clicks
      - MYSQL_DSN=root:root@tcp(mysql:3306)/urlshortener?parseTime=true&loc=UTC
    depends_on:
      localstack:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      disable: true
