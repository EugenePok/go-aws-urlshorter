# Local dependencies for development and integration tests.
# LocalStack (DynamoDB).
# Redis.
services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566" # single edge port for all AWS services
    environment:
      - SERVICES=dynamodb
      - DEBUG=0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4566/_localstack/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
